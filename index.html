<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <div id="invite-error" class="invite-error" hidden>
        <h1 class="invite-error-title">Invite link invalid</h1>
        <p class="invite-error-body">
          This join link is broken or tampered with, so the shared world could
          not be opened. Nothing was changed on this device.
        </p>
        <button id="invite-error-start-fresh" type="button" class="invite-error-btn">
          Start a fresh game
        </button>
      </div>
      <div id="playfield">
        <div id="game">
          <div id="touch-controls" class="touch-controls" aria-hidden="true">
            <div
              id="touch-stick-pad"
              class="touch-stick-pad"
              role="application"
              aria-label="Move"
            >
              <div id="touch-stick-knob" class="touch-stick-knob"></div>
            </div>
            <button
              id="touch-interact"
              type="button"
              class="touch-interact"
              aria-label="Interact"
            >
              E
            </button>
          </div>
        </div>
        <div id="status-panel" aria-label="Player status">
          <div id="status-zone" class="status-line status-zone"></div>
          <div id="status-quest" class="status-line status-quest"></div>
          <div id="status-quest-hint" class="status-line status-quest-hint"></div>
          <div id="status-gate" class="status-line status-gate"></div>
          <div id="status-party" class="status-line status-party"></div>
          <div id="status-materials" class="status-line status-materials"></div>
          <div id="status-session" class="status-line status-session"></div>
          <div id="status-actions" class="status-actions">
            <button id="mute-audio-btn" type="button" class="status-mute-btn">
              Mute
            </button>
            <button id="reset-game-btn" type="button" class="status-reset-btn">
              Reset game
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
